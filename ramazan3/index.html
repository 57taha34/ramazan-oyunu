<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Ramazan Oyunu 🌙</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <canvas id="confetti-canvas"></canvas>

  <!-- ── CHARACTER SELECT ── -->
  <div id="char-select">
    <h1>🌙 RAMAZAN OYUNU</h1>
    <div class="cs-sub">KARAKTERİNİ SEÇ</div>
    <div class="cs-row">
      <div class="cs-card" id="card-ayse" onclick="selectChar('ayse')">
        <canvas id="prev-ayse" width="64" height="80"></canvas>
        <div class="cs-name">AYŞE</div>
        <div class="cs-desc">Hızlı & çevik<br>Lacivert kıyafet</div>
      </div>
      <div class="cs-card" id="card-taha" onclick="selectChar('taha')">
        <canvas id="prev-taha" width="64" height="80"></canvas>
        <div class="cs-name">TAHA</div>
        <div class="cs-desc">Güçlü & kararlı<br>Yeşil kıyafet</div>
      </div>
    </div>
    <button class="cs-start" id="cs-start-btn" onclick="startGame()">OYNA →</button>
  </div>

  <!-- ── GAME PANELS ── -->
  <div class="panel" id="panel-quests">
    <div class="ptitle">📋 GÖREVLER</div>
    <div id="quest-list"></div>
  </div>
  <div class="panel" id="panel-day">
    <div class="day-num" id="day-num">GÜN 1</div>
    <div class="day-sub">RAMAZAN</div>
  </div>
  <div class="panel" id="panel-timer">
    <div class="t-label">İFTARA KALAN</div>
    <div class="t-time" id="t-time">1:40</div>
    <div class="t-bar"><div class="t-fill" id="t-fill" style="width:100%"></div></div>
  </div>

  <div id="dlg">
    <div id="dlg-speaker"></div>
    <div id="dlg-text"></div>
  </div>
  <div id="pbar-wrap">
    <div id="pbar-label"></div>
    <div id="pbar"><div id="pbar-fill"></div></div>
  </div>
  <div id="npc-bubble"></div>

  <div id="overlay">
    <h2 id="ov-title"></h2>
    <div class="ov-sub"   id="ov-sub"></div>
    <div class="ov-result" id="ov-result"></div>
    <div id="ov-btns"></div>
    <div class="pause-hint">P tuşuna bas → devam et</div>
  </div>

  <div id="ctrl">WASD/↑↓←→ Hareket &nbsp;|&nbsp; SPACE Etkileşim &nbsp;|&nbsp; P Duraklat &nbsp;|&nbsp; F1 Debug</div>
</div>

<script src="data.js"></script>
<script src="maps.js"></script>
<script src="audio.js"></script>
<script src="npcs.js"></script>
<script src="game.js"></script>

<script>
// ── CHARACTER SELECT SCREEN ───────────────────────────────────────────────
let _chosen = null;

// Draw previews once scripts load
window.addEventListener('load', () => {
  drawCharPreview(document.getElementById('prev-ayse'), 'ayse');
  drawCharPreview(document.getElementById('prev-taha'), 'taha');
});

function selectChar(id) {
  _chosen = id;
  selectedChar = id;  // from npcs.js
  document.getElementById('card-ayse').classList.toggle('selected', id==='ayse');
  document.getElementById('card-taha').classList.toggle('selected', id==='taha');
  const btn = document.getElementById('cs-start-btn');
  btn.classList.add('visible');
  btn.textContent = (id==='ayse'?'AYŞE':'TAHA') + ' ile Oyna →';
}

function startGame() {
  if(!_chosen) return;
  document.getElementById('char-select').style.display='none';
  GameAudio.init();
  startDay(1);
  requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
